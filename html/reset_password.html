<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Reset — SmartAttend</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg: #0b1120;
        --card: #1e293b;
        --primary: #6366f1;
        --accent: #f59e0b;
        --text: #f8fafc;
        --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: var(--card);
      padding: 40px;
      border-radius: 28px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .logo-glow {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 18px;
        margin: 0 auto 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }
    h2 { margin: 0 0 10px 0; font-size: 26px; font-weight: 700; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: white;
      font-family: inherit;
      box-sizing: border-box;
      font-size: 15px;
      transition: all 0.3s;
    }
    input:focus { border-color: var(--primary); outline: none; background: rgba(15,23,42,0.9); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    .otp-input {
        letter-spacing: 10px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
      font-size: 16px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #message { margin-top: 25px; font-size: 14px; padding: 15px; border-radius: 12px; display: none; line-height: 1.4; }
    .success { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .error { background: rgba(244,63,94,0.1); color: #f43f5e; border: 1px solid rgba(244,63,94,0.2); }
    
    @media (max-width: 480px) {
        .card { padding: 30px 20px; border-radius: 20px; }
        h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-glow">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h2>Identity Verification</h2>
    <div class="form-group">
      <label>Your Student ID</label>
      <input type="text" id="studentId" class="otp-input" placeholder="e.g. 10452" style="letter-spacing:2px; font-size:18px;">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>
    
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••">
    </div>
    
    <button class="btn" id="btn" onclick="submitReset()">Verify & Update</button>
    <div id="message"></div>
  </div>

  <script>
    const email = "<?!= email ?>";
    const token = "<?!= token ?>";
    const scriptUrl = "<?!= ScriptApp.getService().getUrl() ?>";

    async function submitReset() {
        const studentId = document.getElementById('studentId').value;
        const pass = document.getElementById('pass').value;
        const confirm = document.getElementById('confirm').value;
        const btn = document.getElementById('btn');

        if(!studentId) return showMsg('Please enter your Student ID.', true);
        if(!pass || pass.length < 6) return showMsg('Password must be at least 6 characters.', true);
        if(pass !== confirm) return showMsg('Passwords do not match.', true);

        btn.disabled = true;
        btn.innerHTML = '<span style="opacity:0.7">Verifying...</span>';

        try {
            // Use GET request to avoid Google Apps Script POST/CORS preflight issues on mobile
            const getUrl = scriptUrl + '?action=confirm_reset&email=' + encodeURIComponent(email) + '&token=' + encodeURIComponent(token) + '&studentId=' + encodeURIComponent(studentId) + '&newPassword=' + encodeURIComponent(pass);
            
            const resp = await fetch(getUrl);
            const result = await resp.json();
            
            if(result.status === 'success') {
                showMsg('Verification successful! Your password has been updated. You can now close this page.', false);
                btn.style.display = 'none';
            } else {
                showMsg(result.message, true);
                btn.disabled = false;
                btn.innerHTML = 'Verify & Update';
            }
        } catch (e) {
            showMsg('Connection error. Please try again.', true);
            btn.disabled = false;
            btn.innerHTML = 'Verify & Update';
        }
    }

    function showMsg(t, isError) {
        const msg = document.getElementById('message');
        msg.innerText = t;
        msg.className = isError ? 'error' : 'success';
        msg.style.display = 'block';
    }
  </script>
</body>
</html>
